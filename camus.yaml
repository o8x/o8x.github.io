camus:
    source_dir: posts
    assets_dir: assets
    output:
        meta: true
        sitemap: true
        filename_case: keep
        dest_dir: html
    deploy:
        protocol: https://
        domain_name: stdout.com.cn
        path_prefix:
    render:
        theme: pixel
        html_engine: default
        markdown_engine: cmark-gfm
        markdown_options:
            - DEFAULT
            - VALIDATE_UTF8
            - SMART
            - FOOTNOTES
            - FULL_INFO_STRING
            - TABLE_PREFER_STYLE_ATTRIBUTES
            - UNSAFE

friends:
    -   title: 一言网
        link_url: https://hitokoto.cn
        image_url: https://i.loli.net/2020/02/07/kDIUWCQpKEdFTP8.png
        desc: 一言网（hitokoto.cn）创立于 2016 年，隶属于萌创团队，目前网站主要提供一句话服务。

    -   title: 藤之青
        link_url: https://i.a632079.me/?ref=stdout.com.cn
        image_url: https://cdn.a632079.me/favicon.ico
        desc: 亲眼所见，亦非真实

catalog:
    -   path: /
        title: Alex
        subtitle: What's past is prologue.
        description: |
            Changer pour que l’amour arrive
            Changer pour que la passion nous délivre
            Pour qu’un jour notre histoire
            Soit écrite dans les livres

    -   path: /Jiye-Street
        transfers:
            -   source: .
                target: /novel/jiye-street
        title: 极夜长街
        subtitle: 光明与黑暗，一体两面。
        description: |
            人妖两族交界处有一条永远是黑夜的地下长街，被称为星垂市场。这里繁荣异常，人妖两族频繁进行货物与消息贸易，以及不为外人道的交易。
