camus:
    source_dir: posts
    output_dir: html
    assets_dir: assets
    sitemap: true
    theme: pixel
    filename_case: keep
    toc_format: json
    domain_name: stdout.com.cn
    render:
        static: inja
        engine: cmark-gfm
        options:
            - DEFAULT
            - VALIDATE_UTF8
            - SMART
            - FOOTNOTES
            - FULL_INFO_STRING
            - TABLE_PREFER_STYLE_ATTRIBUTES
            - UNSAFE

catalog:
    -   path: /
        title: Alex
        subtitle: What's past is prologue.
        description: |
            Changer pour que l’amour arrive
            Changer pour que la passion nous délivre
            Pour qu’un jour notre histoire
            Soit écrite dans les livres

    -   path: /Jiye-Street
        transfers:
            -   source: .
                target: /novel/jiye-street
        title: 极夜长街
        subtitle: 光明与黑暗，一体两面。
        description: |
            人妖两族交界处有一条永远是黑夜的地下长街，被称为星垂市场。这里繁荣异常，人妖两族频繁进行货物与消息贸易，以及不为外人道的交易。
