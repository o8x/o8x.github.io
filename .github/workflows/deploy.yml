name: Build and deploy

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

permissions:
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-24.04
        container:
            image: docker.io/ubuntu:24.04
        env:
            CAMUS_VERSION: v8.4.0
        steps:
            -   uses: actions/checkout@v4
            -   name: Install dependencies
                run: |
                    apt update -y
                    apt install -y wget libarchive-dev
                    wget https://github.com/o8x/camus/releases/download/${CAMUS_VERSION}/camus-${CAMUS_VERSION}_linux6.17.0-1020-azure-x86_64.deb -O camus.deb
                    dpkg -i camus.deb

            -   name: Build
                run: |
                    echo "GITHUB_ACTION_URL=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|g" >> .env
                    camus -iI
                    camus -d

            -   name: Setup Pages
                uses: actions/configure-pages@v5

            -   name: Upload artifact
                uses: actions/upload-pages-artifact@v3
                with:
                    path: './html'

            -   name: Deploy to GitHub Pages
                id: deployment
                uses: actions/deploy-pages@v5
