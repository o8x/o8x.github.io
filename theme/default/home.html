<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{site.subtitle}}">
    <meta name="build-time" content="{{build.time}}">
    <meta name="build-type" content="{{build.build-type}}">
    <meta name="cmake-version" content="{{build.cmake-version}}">
    <meta name="cxx-standard" content="{{build.cxx-standard}}">
    <title>{{site.title}} - {{site.subtitle}}</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
</head>
<body>
<table width="800" align="center" border="0" cellpadding="0" cellspacing="0"><tr><td>

<center>
    <h1>{{site.title}}</h1>
    <p><em>{{site.subtitle}}</em></p>
</center>

<blockquote>
    <p>{{site.description}}</p>
</blockquote>

<h3>&#9733; Index of Posts</h3>

<ul id="toc-list">
    <li><em>Loading...</em></li>
</ul>

<center>{{build.powered-by}}</center>

</td></tr></table>

<script>
    (function() {
        var formatDate = function(ts) {
            var n = Number(ts);
            if (!n || isNaN(n)) return '';
            var d = new Date(n * 1000);
            if (isNaN(d.getTime())) return '';
            return d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0');
        };

        var getDirParam = function() {
            var m = window.location.search.match(/[?&]dir=([^&]*)/);
            return m ? decodeURIComponent(m[1]) : '';
        };

        var buildArticleUrl = function(parentPath, url) {
            if (parentPath === '/' || parentPath === '') {
                return '/' + url;
            }
            var p = parentPath;
            if (!p.startsWith('/')) p = '/' + p;
            if (p.endsWith('/')) p = p.slice(0, -1);
            return p + '/' + url;
        };

        var renderToc = function(dirs) {
            var dirParam = getDirParam();
            var rootDir = null;
            var subDirs = [];
            var currentDir = null;

            for (var i = 0; i < dirs.length; i++) {
                var d = dirs[i];
                if (d.path === '/') {
                    rootDir = d;
                } else {
                    subDirs.push(d);
                }
            }

            if (dirParam) {
                for (var j = 0; j < dirs.length; j++) {
                    var dp = dirs[j].path;
                    if (dp === '/' + dirParam || dp === dirParam || dp === '/' + dirParam + '/' || dp === dirParam + '/') {
                        currentDir = dirs[j];
                        break;
                    }
                }
            }

            if (!currentDir) {
                currentDir = rootDir;
            }

            var items = [];

            if (dirParam) {
                items.push({
                    type: 'back',
                    label: '/',
                    url: '/',
                    time: ''
                });
            }

            if (!dirParam && rootDir) {
                for (var k = 0; k < subDirs.length; k++) {
                    var sd = subDirs[k];
                    var dirHref = '/?dir=' + encodeURIComponent(sd.path.replace(/^\/+/, ''));
                    items.push({
                        type: 'dir',
                        label: sd.title,
                        url: dirHref,
                        time: formatDate(sd.create_time)
                    });
                }
            }

            if (currentDir && currentDir.articles) {
                for (var a = 0; a < currentDir.articles.length; a++) {
                    var art = currentDir.articles[a];
                    items.push({
                        type: 'file',
                        label: art.display_name,
                        url: buildArticleUrl(currentDir.path, art.url),
                        time: formatDate(art.create_time)
                    });
                }
            }

            var fileIndex = 0;
            var html = items.map(function(item) {
                if (item.type === 'file') {
                    fileIndex++;
                    return '<li>' +
                        '<a href="' + item.url + '">' + fileIndex + '. ' + item.label + '</a>' +
                        ' <small>(' + item.time + ')</small>' +
                        '</li>';
                } else if (item.type === 'dir') {
                    return '<li>+ [<b><a href="' + item.url + '">' + item.label + '/</a>] </b><small>(' + item.time + ')</small></li>';
                } else {
                    return '<li><a href="' + item.url + '">' + item.label + '</a></li>';
                }
            }).join('');

            document.getElementById('toc-list').innerHTML = html;
        };

        fetch('/toc.json')
            .then(function(res) { return res.json(); })
            .then(renderToc)
            .catch(function(err) { console.error('Failed to load toc.json:', err); });
    })();
</script>
</body>
</html>
