<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{page.description}}">
    <title>{{page.title}} - {{site.title}}</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
        VT323 也是像素字体，相比中文偏小，Press Start 2P 则偏大
        <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" id="hljs-theme"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style id="pixel-style">
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #c7d2e0;
            --text-secondary: #7b8ca3;
            --accent: #ff6b35;
            --accent-glow: #ff9f45;
            --border: #2a3a5c;
            --divider: #2a3a5c;
            --progress-bg: #2a3a5c;
            --nav-hover-bg: #1e2d4a;
            --code-bg: #0f1425;
            --code-shadow: none;
            --green: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Source Code Pro', 'Noto Sans SC', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.8;
            image-rendering: pixelated;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.06) 2px,
                    rgba(0, 0, 0, 0.06) 4px
            );
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--accent);
            z-index: 1000;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .reading-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        .chapter-header {
            text-align: center;
            padding: 4rem 0 2rem;
            margin-bottom: 2.5rem;
            border-bottom: 4px double var(--border);
        }

        .chapter-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.7rem;
            color: var(--accent);
            letter-spacing: 0.1em;
            line-height: 1.8;
            text-shadow: 2px 2px 0 var(--bg),
            3px 3px 0 var(--accent);
            image-rendering: pixelated;
        }

        .chapter-meta {
            margin-top: 1.2rem;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .chapter-meta span {
            margin: 0 0.5rem;
        }

        .chapter-content {
            font-size: 1rem;
            line-height: 2;
            text-align: justify;
            word-break: break-word;
        }

        .chapter-content p {
            text-indent: 2em;
            margin-bottom: 1rem;
        }

        .chapter-content h1,
        .chapter-content h2,
        .chapter-content h3,
        .chapter-content h4,
        .chapter-content h5,
        .chapter-content h6 {
            font-family: 'Press Start 2P', monospace;
            text-indent: 0;
            margin: 2.5rem 0 1rem;
            color: var(--accent);
            text-shadow: 2px 2px 0 var(--bg);
        }

        .chapter-content h1 {
            font-size: 1.4rem;
        }

        .chapter-content h2 {
            font-size: 1.2rem;
        }

        .chapter-content h3 {
            font-size: 1rem;
        }

        .chapter-content blockquote {
            font-family: 'Press Start 2P', monospace;
            text-indent: 0;
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            border-left: 4px solid var(--accent);
            border-image: repeating-linear-gradient(
                    0deg,
                    var(--accent),
                    var(--accent) 4px,
                    transparent 4px,
                    transparent 8px
            ) 4;
            background: var(--card-bg);
            color: var(--text-secondary);
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.2),
            inset 2px 2px 0 rgba(255, 255, 255, 0.03);
        }

        .chapter-content blockquote p {
            text-indent: 0;
            margin-bottom: 0.5rem;
        }

        .chapter-content ul,
        .chapter-content ol {
            text-indent: 0;
            margin: 1rem 0 1rem 2rem;
        }

        .chapter-content li {
            margin-bottom: 0.3rem;
        }

        .chapter-content code:not(.hljs) {
            background: var(--code-bg);
            padding: 0.15em 0.4em;
            font-size: 0.85em;
            font-family: 'Courier New', monospace;
            color: var(--green);
            border: 1px solid var(--border);
        }

        .chapter-content code.hljs {
            display: block;
            overflow-x: auto;
            padding: 1rem 1.5rem;
            font-size: 0.8rem;
            line-height: 1.7;
            border: 2px solid var(--border);
            background: var(--code-bg);
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.3),
            inset 2px 2px 0 rgba(255, 255, 255, 0.02);
        }

        .chapter-content pre {
            overflow-x: auto;
            margin: 1.5rem 0;
            text-indent: 0;
            border: 2px solid var(--border);
            background: var(--code-bg);
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.3),
            inset 2px 2px 0 rgba(255, 255, 255, 0.02);
        }

        .chapter-content pre code.hljs {
            padding: 1.2rem 1.5rem;
            font-size: 0.82rem;
            line-height: 1.7;
            background: transparent;
            border: none;
            box-shadow: none;
            display: block;
        }

        .chapter-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1.5rem auto;
            border: 3px solid var(--border);
            image-rendering: pixelated;
        }

        .chapter-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 2px dotted var(--accent);
        }

        .chapter-content a:hover {
            color: var(--accent-glow);
        }

        .chapter-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 0;
            margin-top: 2rem;
            border-top: 4px double var(--border);
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
            text-decoration: none;
            padding: 0.6rem 1rem;
            border: 2px solid var(--border);
            background: var(--card-bg);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.4rem;
            transition: all 0.1s;
            max-width: 45%;
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.2),
            inset 2px 2px 0 rgba(255, 255, 255, 0.05);
        }

        .nav-link:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translate(-1px, -1px);
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.2),
            inset 2px 2px 0 rgba(255, 255, 255, 0.05),
            3px 3px 0 var(--accent);
        }

        .nav-link:active {
            transform: translate(1px, 1px);
            box-shadow: inset 2px 2px 0 rgba(0, 0, 0, 0.2),
            inset -2px -2px 0 rgba(255, 255, 255, 0.05);
        }

        .nav-link.disabled {
            color: var(--text-secondary);
            border-color: var(--border);
            cursor: default;
            pointer-events: none;
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.2),
            inset 2px 2px 0 rgba(255, 255, 255, 0.05);
        }

        .nav-link .nav-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.35rem;
            color: var(--text-secondary);
            display: block;
            line-height: 1.6;
        }

        .nav-link .nav-title {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Courier New', 'Noto Sans SC', monospace;
            font-size: 0.8rem;
        }

        .nav-center {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-family: 'Press Start 2P', monospace;
        }

        .nav-center a {
            color: var(--accent);
            text-decoration: none;
        }

        .nav-center a:hover {
            color: var(--accent-glow);
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 44px;
            height: 44px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--accent);
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            z-index: 1000;
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.3),
            inset 2px 2px 0 rgba(255, 255, 255, 0.05);
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            background: var(--accent);
            color: #1a1a2e;
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.3),
            inset 2px 2px 0 rgba(255, 255, 255, 0.1),
            0 0 12px var(--accent);
        }

        .theme-toggle:active {
            transform: translate(2px, 2px);
            box-shadow: inset 2px 2px 0 rgba(0, 0, 0, 0.3),
            inset -2px -2px 0 rgba(255, 255, 255, 0.05);
        }

        .page-footer {
            text-align: center;
            color: var(--text-secondary);
            font-family: 'Courier New', 'Noto Sans SC', monospace;
            font-size: 0.8rem;
            padding: 0 0 4rem 0;
        }

        .page-footer a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent);
        }

        .page-footer a:hover {
            color: var(--accent-glow);
        }

        @media (max-width: 640px) {
            .reading-container {
                padding: 0 1rem;
            }

            .chapter-header {
                padding: 2.5rem 0 1.5rem;
            }

            .chapter-title {
                font-size: 0.7rem;
            }

            .chapter-content {
                font-size: 0.9rem;
            }

            .chapter-nav {
                flex-direction: column;
                gap: 0.8rem;
                padding: 2rem 0;
            }

            .nav-link {
                max-width: 100%;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="progress-bar" id="progress-bar"></div>
<div class="scanlines"></div>
<button class="theme-toggle" id="theme-toggle" aria-label="切换主题">[]</button>

<div class="reading-container">
    <header class="chapter-header">
        <h1 class="chapter-title">{{page.title}}</h1>
        <div class="chapter-meta">
            <span id="word-count"></span>
            <span>&#124;</span>
            <span>{{page.date}}</span>
        </div>
    </header>

    <article class="chapter-content">
        {{page.content}}
    </article>

    <nav class="chapter-nav" id="chapter-nav">
        <a class="nav-link disabled" id="prev-link" href="#">
            <span class="nav-label">PREV</span>
            <span class="nav-title"></span>
        </a>
        <span class="nav-center">
                <a id="toc-link" href="/">目 录</a>
            </span>
        <a class="nav-link disabled" id="next-link" href="#">
            <span class="nav-label">NEXT</span>
            <span class="nav-title"></span>
        </a>
    </nav>

    <footer class="page-footer">{{build.powered-by}}</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
    (function () {
        var countWords = function () {
            var content = document.querySelector(".chapter-content")
            if (!content) return 0
            var text = content.textContent || ""
            var chineseChars = (text.match(/[\u4e00-\u9fff]/g) || []).length
            var words = text.replace(/[\u4e00-\u9fff]/g, "").split(/\s+/).filter(Boolean).length
            return chineseChars + words
        }

        var updateWordCount = function () {
            var count = countWords()
            var el = document.getElementById("word-count")
            if (el && count > 0) {
                var readMin = Math.max(1, Math.ceil(count / 400))
                el.textContent = count + " 字 · 约 " + readMin + " 分钟"
            }
        }

        var updateProgress = function () {
            var bar = document.getElementById("progress-bar")
            if (!bar) return
            var scrollTop = window.scrollY || document.documentElement.scrollTop
            var docHeight = document.documentElement.scrollHeight - window.innerHeight
            if (docHeight <= 0) {
                bar.style.width = "0%"
                return
            }
            var progress = Math.min(100, Math.max(0, (scrollTop / docHeight) * 100))
            bar.style.width = progress + "%"
        }

        var setupNavigation = function (tocData) {
            if (!tocData || tocData.length === 0) return

            var buildArticleUrl = function (parentPath, url) {
                if (parentPath === '/' || parentPath === '') {
                    return '/' + url;
                }
                var p = parentPath;
                if (!p.startsWith('/')) p = '/' + p;
                if (p.endsWith('/')) p = p.slice(0, -1);
                return p + '/' + url;
            };

            var allArticles = [];
            for (var i = 0; i < tocData.length; i++) {
                var dir = tocData[i];
                if (!dir.articles) continue;
                for (var j = 0; j < dir.articles.length; j++) {
                    var art = dir.articles[j];
                    allArticles.push({
                        url: buildArticleUrl(dir.path, art.url),
                        display_name: art.display_name
                    });
                }
            }

            if (allArticles.length === 0) return;

            var currentPath = window.location.pathname;
            var currentIndex = -1;
            for (var k = 0; k < allArticles.length; k++) {
                if (allArticles[k].url === currentPath) {
                    currentIndex = k;
                    break;
                }
            }
            if (currentIndex === -1) return;

            var prevLink = document.getElementById("prev-link");
            var nextLink = document.getElementById("next-link");

            if (currentIndex > 0) {
                prevLink.className = "nav-link";
                prevLink.href = allArticles[currentIndex - 1].url;
                prevLink.querySelector(".nav-title").textContent = allArticles[currentIndex - 1].display_name;
            }
            if (currentIndex < allArticles.length - 1) {
                nextLink.className = "nav-link";
                nextLink.href = allArticles[currentIndex + 1].url;
                nextLink.querySelector(".nav-title").textContent = allArticles[currentIndex + 1].display_name;
            }

            var tocLink = document.getElementById("toc-link");
            if (tocLink) {
                var parentDir = null;
                var currentPath = window.location.pathname;
                for (var d = 0; d < tocData.length; d++) {
                    var dd = tocData[d];
                    if (!dd.articles) continue;
                    for (var aa = 0; aa < dd.articles.length; aa++) {
                        if (buildArticleUrl(dd.path, dd.articles[aa].url) === currentPath) {
                            parentDir = dd;
                            break;
                        }
                    }
                    if (parentDir) break;
                }
                if (parentDir) {
                    if (parentDir.path === '/') {
                        tocLink.href = '/';
                    } else {
                        var p = parentDir.path.replace(/^\/+/, '');
                        tocLink.href = '/?dir=' + encodeURIComponent(p);
                    }
                }
            }
        }

        var loadToc = function () {
            var xhr = new XMLHttpRequest()
            xhr.open("GET", "/toc.json", true)
            xhr.onload = function () {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var data = JSON.parse(xhr.responseText)
                        setupNavigation(data)
                    } catch (e) {
                        console.error("Failed to parse toc.json:", e)
                    }
                }
            }
            xhr.onerror = function () {
                console.error("Failed to load toc.json")
            }
            xhr.send()
        }

        var initTheme = function () {
            var saved = localStorage.getItem("pixel-theme")
            if (saved === "light") {
                applyLightTheme()
            }
        }

        var applyLightTheme = function () {
            var style = document.getElementById("pixel-style")
            style.textContent = style.textContent.replace(/:root\s*\{[^}]*\}/, function () {
                return ":root {" +
                    "--bg: #e8e8e0;" +
                    "--card-bg: #f5f5ee;" +
                    "--text: #2d2d2d;" +
                    "--text-secondary: #6b6b6b;" +
                    "--accent: #e07b39;" +
                    "--accent-glow: #f09050;" +
                    "--border: #c0c0b0;" +
                    "--divider: #c0c0b0;" +
                    "--progress-bg: #c0c0b0;" +
                    "--nav-hover-bg: #e8e0d0;" +
                    "--code-bg: #ddd8c8;" +
                    "--code-shadow: none;" +
                    "--green: #4a9c3f;" +
                    "}"
            })
            document.getElementById("hljs-theme").href = "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
            document.getElementById("theme-toggle").innerHTML = "[ ]"
            localStorage.setItem("pixel-theme", "light")
        }

        var applyDarkTheme = function () {
            var style = document.getElementById("pixel-style")
            style.textContent = style.textContent.replace(/:root\s*\{[^}]*\}/, function () {
                return ":root {" +
                    "--bg: #1a1a2e;" +
                    "--card-bg: #16213e;" +
                    "--text: #c7d2e0;" +
                    "--text-secondary: #7b8ca3;" +
                    "--accent: #ff6b35;" +
                    "--accent-glow: #ff9f45;" +
                    "--border: #2a3a5c;" +
                    "--divider: #2a3a5c;" +
                    "--progress-bg: #2a3a5c;" +
                    "--nav-hover-bg: #1e2d4a;" +
                    "--code-bg: #0f1425;" +
                    "--code-shadow: none;" +
                    "--green: #4ade80;" +
                    "}"
            })
            document.getElementById("hljs-theme").href = "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
            document.getElementById("theme-toggle").innerHTML = "[]"
            localStorage.setItem("pixel-theme", "dark")
        }

        document.getElementById("theme-toggle").addEventListener("click", function () {
            if (localStorage.getItem("pixel-theme") === "light") {
                applyDarkTheme()
            } else {
                applyLightTheme()
            }
        })

        window.addEventListener("scroll", updateProgress, {passive: true})

        updateWordCount()
        updateProgress()
        loadToc()
        initTheme()
        hljs.highlightAll()
    })()
</script>
</body>
</html>
