<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{site.subtitle}}">
    <meta name="build-time" content="{{build.time}}">
    <meta name="build-type" content="{{build.build-type}}">
    <meta name="cmake-version" content="{{build.cmake-version}}">
    <meta name="cxx-standard" content="{{build.cxx-standard}}">
    <title>{{site.title}} - {{site.subtitle}}</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style id="pixel-style">
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #c7d2e0;
            --text-secondary: #7b8ca3;
            --accent: #ff6b35;
            --accent-glow: #ff9f45;
            --border: #2a3a5c;
            --divider: #2a3a5c;
            --code-bg: #0f1425;
            --nav-hover-bg: #1e2d4a;
            --green: #4ade80;
            --yellow: #facc15;
            --pink: #f472b6;
            --cyan: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', 'Source Code Pro', 'Noto Sans SC', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.8;
            image-rendering: pixelated;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.06) 2px,
                rgba(0, 0, 0, 0.06) 4px
            );
        }

        .cover {
            max-width: 1350px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
        }

        .pixel-deco {
            text-align: center;
            margin-bottom: 1rem;
            color: var(--accent);
            font-size: 0.5rem;
            letter-spacing: 0.5rem;
            font-family: 'Press Start 2P', monospace;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .cover-header {
            text-align: center;
            padding: 3rem 0;
            margin-bottom: 2rem;
            border: 4px solid var(--accent);
            border-image: repeating-linear-gradient(
                45deg,
                var(--accent),
                var(--accent) 4px,
                var(--bg) 4px,
                var(--bg) 8px
            ) 4;
            background: var(--card-bg);
            box-shadow:
                0 0 0 4px var(--bg),
                0 0 0 8px var(--accent),
                0 0 20px rgba(255, 107, 53, 0.3);
        }

        .cover-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.7rem;
            color: var(--accent);
            text-shadow:
                2px 2px 0 var(--bg),
                4px 4px 0 var(--accent);
            letter-spacing: 0.15em;
            line-height: 2;
            margin-bottom: 1rem;
            image-rendering: pixelated;
        }

        .cover-subtitle {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.9rem;
            color: var(--accent-glow);
            letter-spacing: 0.3em;
            margin-top: 0.5rem;
        }

        .cover-description {
            text-indent: 2em;
            text-align: center;
            color: var(--text-secondary);
            font-family:
                    'VT323',
                    'Courier New',
                    'NSimSun',
                    'GB18030 Bitmap',
                    'Unifont',
                    'WenQuanYi Bitmap Song',
                    '文泉驿点阵宋体',
                    'SimSun',
                    '宋体',
                    'Noto Serif CJK SC',
                    'AR PL UMing CN',
                    'Noto Sans SC',
                    serif,
                    monospace;
            font-size: 1.1rem;
            line-height: 2;
            padding: 2rem 1.5rem;
            margin: 2rem auto;
            border: 2px solid var(--border);
            background: var(--card-bg);
            box-shadow:
                inset 0 0 0 2px var(--bg),
                0 0 0 2px var(--border);
            position: relative;
        }

        .cover-description::before {
            content: 'STORY INTRO';
            position: absolute;
            top: -0.6rem;
            left: 1rem;
            background: var(--bg);
            padding: 0 0.5rem;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.4rem;
            color: var(--accent);
            letter-spacing: 0.3em;
        }

        .toc-header {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.9rem;
            color: var(--accent);
            text-align: center;
            margin: 2.5rem 0 1.5rem;
            letter-spacing: 0.3em;
            text-shadow: 2px 2px 0 var(--bg);
        }

        .toc-loading {
            text-align: center;
            padding: 2rem 0;
        }

        .toc-loading-text {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            color: var(--accent);
            letter-spacing: 0.3em;
            margin-bottom: 1.2rem;
        }

        .toc-loading-dots {
            display: inline-flex;
            gap: 0.4rem;
            margin: 0 0.3rem;
            vertical-align: middle;
        }

        .toc-loading-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            display: inline-block;
            animation: dotBounce 0.8s infinite;
        }

        .toc-loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .toc-loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .toc-loading-bar {
            width: 240px;
            height: 12px;
            margin: 0 auto;
            border: 2px solid var(--border);
            background: var(--code-bg);
            box-shadow:
                inset -2px -2px 0 rgba(0,0,0,0.3),
                inset 2px 2px 0 rgba(255,255,255,0.02);
            padding: 1px;
            position: relative;
            overflow: hidden;
        }

        .toc-loading-bar-fill {
            height: 100%;
            width: 0;
            background: repeating-linear-gradient(
                90deg,
                var(--accent),
                var(--accent) 8px,
                var(--accent-glow) 8px,
                var(--accent-glow) 16px
            );
            animation: barFill 2.5s steps(6) infinite;
        }

        @keyframes barFill {
            0% { width: 0; }
            40% { width: 60%; }
            70% { width: 70%; }
            100% { width: 70%; }
        }

        .toc-loading-blocks {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 0.8rem;
        }

        .toc-loading-block {
            width: 10px;
            height: 10px;
            background: var(--border);
            animation: blockFlash 1.8s infinite;
        }

        .toc-loading-block:nth-child(1) { animation-delay: 0s; }
        .toc-loading-block:nth-child(2) { animation-delay: 0.225s; }
        .toc-loading-block:nth-child(3) { animation-delay: 0.45s; }
        .toc-loading-block:nth-child(4) { animation-delay: 0.675s; }
        .toc-loading-block:nth-child(5) { animation-delay: 0.9s; }
        .toc-loading-block:nth-child(6) { animation-delay: 1.125s; }
        .toc-loading-block:nth-child(7) { animation-delay: 1.35s; }
        .toc-loading-block:nth-child(8) { animation-delay: 1.575s; }

        @keyframes blockFlash {
            0%, 60% { background: var(--border); }
            65% { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
            70%, 100% { background: var(--border); }
        }

        body.toc-animating {
            overflow: hidden;
            height: 100vh;
        }

        .toc-list {
            list-style: none;
            padding: 0;
        }

        .toc-list.done .toc-item {
            animation: tocFadeIn 0.3s steps(3) both;
        }

        @keyframes tocFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            50% {
                opacity: 0.5;
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toc-item {
            display: flex;
            align-items: center;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.3rem;
            background: var(--card-bg);
            border: 2px solid var(--border);
            transition: all 0.15s;
            box-shadow:
                inset -2px -2px 0 rgba(0,0,0,0.2),
                inset 2px 2px 0 rgba(255,255,255,0.05);
            position: relative;
        }

        .toc-item:hover {
            border-color: var(--accent);
            background: var(--nav-hover-bg);
            transform: translate(-2px, -2px);
            box-shadow:
                inset -2px -2px 0 rgba(0,0,0,0.2),
                inset 2px 2px 0 rgba(255,255,255,0.05),
                4px 4px 0 var(--accent);
        }

        .toc-item::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--green);
            margin-right: 1rem;
            flex-shrink: 0;
            box-shadow: 0 0 6px var(--green);
        }

        .toc-item:nth-child(3n+2)::before {
            background: var(--yellow);
            box-shadow: 0 0 6px var(--yellow);
        }

        .toc-item:nth-child(3n)::before {
            background: var(--pink);
            box-shadow: 0 0 6px var(--pink);
        }

        .toc-num {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.45rem;
            color: var(--text-secondary);
            min-width: 3rem;
            text-align: right;
            margin-right: 1rem;
            flex-shrink: 0;
        }

        .toc-dir .toc-num {
            color: var(--accent);
            font-size: 0.42rem;
        }

        .toc-back-root .toc-num {
            color: var(--cyan);
            font-size: 0.42rem;
        }

        .toc-link {
            color: var(--text);
            text-decoration: none;
            font-family: 'Courier New', 'Noto Sans SC', monospace;
            font-size: 1rem;
            flex: 1;
            transition: color 0.15s;
        }

        .toc-link:hover {
            color: var(--accent);
        }

        .toc-date {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.38rem;
            color: var(--text-secondary);
            margin-left: 1rem;
            flex-shrink: 0;
        }

        .toc-dir .toc-link {
            font-family: 'Courier New', 'Noto Sans SC', monospace;
            font-size: 1rem;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        .toc-dir .toc-link::after {
            content: '/';
            margin-left: 0.3rem;
            color: var(--accent-glow);
        }

        .toc-dir::before {
            background: var(--accent) !important;
            box-shadow: 0 0 6px var(--accent) !important;
            width: 10px !important;
            height: 10px !important;
        }

        .toc-dir:hover {
            border-color: var(--accent-glow);
            box-shadow:
                inset -2px -2px 0 rgba(0,0,0,0.2),
                inset 2px 2px 0 rgba(255,255,255,0.05),
                4px 4px 0 var(--accent-glow);
        }

        .toc-back-root .toc-link {
            font-family: 'Courier New', 'Noto Sans SC', monospace;
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: bold;
        }

        .toc-back-root::before {
            background: var(--cyan) !important;
            box-shadow: 0 0 6px var(--cyan) !important;
            width: 10px !important;
            height: 10px !important;
        }

        .toc-back-root:hover {
            border-color: var(--cyan);
            box-shadow:
                inset -2px -2px 0 rgba(0,0,0,0.2),
                inset 2px 2px 0 rgba(255,255,255,0.05),
                4px 4px 0 var(--cyan);
        }

        .cover-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding-top: 2rem;
            font-family: 'Courier New', 'Noto Sans SC', monospace;
        }

        .cover-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .cover-footer a:hover {
            color: var(--accent-glow);
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 44px;
            height: 44px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--accent);
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            z-index: 1000;
            box-shadow:
                inset -2px -2px 0 rgba(0,0,0,0.3),
                inset 2px 2px 0 rgba(255,255,255,0.05);
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            background: var(--accent);
            color: #1a1a2e;
            box-shadow:
                inset -2px -2px 0 rgba(0,0,0,0.3),
                inset 2px 2px 0 rgba(255,255,255,0.1),
                0 0 12px var(--accent);
        }

        .theme-toggle:active {
            transform: translate(2px, 2px);
            box-shadow:
                inset 2px 2px 0 rgba(0,0,0,0.3),
                inset -2px -2px 0 rgba(255,255,255,0.05);
        }

        .pixel-stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 230px 80px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 310px 50px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 400px 100px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 500px 30px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 600px 90px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 700px 60px, rgba(255,255,255,0.15), transparent);
        }

        @media (max-width: 640px) {
            .cover {
                padding: 2rem 1rem 3rem;
            }
            .cover-title {
                font-size: 0.9rem;
            }
            .cover-subtitle {
                font-size: 0.45rem;
            }
            .toc-item {
                flex-wrap: wrap;
                padding: 0.5rem;
            }
            .toc-date {
                width: 100%;
                margin-left: 2.5rem;
                margin-top: 0.3rem;
            }
            .toc-link {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-stars"></div>
    <div class="scanlines"></div>
    <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">[]</button>

    <div class="cover" style="position:relative;z-index:1">
        <div class="pixel-deco">[ * * * * * * * * * * ]</div>
        <header class="cover-header">
            <h1 class="cover-title">{{site.title}}</h1>
            <p class="cover-subtitle">{{site.subtitle}}</p>
        </header>

        <p class="cover-description">{{site.description}}</p>

        <div class="toc-header">&#9654; 目 录 &#9664;</div>

        <div id="toc-loading" class="toc-loading">
            <div class="toc-loading-text">
                LOADING
                <span class="toc-loading-dots">
                    <span class="toc-loading-dot"></span>
                    <span class="toc-loading-dot"></span>
                    <span class="toc-loading-dot"></span>
                </span>
            </div>
            <div class="toc-loading-bar">
                <div class="toc-loading-bar-fill"></div>
            </div>
            <div class="toc-loading-blocks">
                <span class="toc-loading-block"></span>
                <span class="toc-loading-block"></span>
                <span class="toc-loading-block"></span>
                <span class="toc-loading-block"></span>
                <span class="toc-loading-block"></span>
                <span class="toc-loading-block"></span>
                <span class="toc-loading-block"></span>
                <span class="toc-loading-block"></span>
            </div>
        </div>

        <ul class="toc-list" id="toc-list" style="display:none"></ul>

        <footer class="cover-footer">{{build.powered-by}}</footer>
    </div>

    <script>
        (function() {
            var formatDate = function(ts) {
                var n = Number(ts);
                if (!n || isNaN(n)) return '';
                var d = new Date(n * 1000);
                if (isNaN(d.getTime())) return '';
                return d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0');
            };

            var getDirParam = function() {
                var m = window.location.search.match(/[?&]dir=([^&]*)/);
                return m ? decodeURIComponent(m[1]) : '';
            };

            var buildArticleUrl = function(parentPath, url) {
                if (parentPath === '/' || parentPath === '') {
                    return '/' + url;
                }
                var p = parentPath;
                if (!p.startsWith('/')) p = '/' + p;
                if (p.endsWith('/')) p = p.slice(0, -1);
                return p + '/' + url;
            };

            var renderToc = function(dirs) {
                var dirParam = getDirParam();
                var rootDir = null;
                var subDirs = [];
                var currentDir = null;

                for (var i = 0; i < dirs.length; i++) {
                    var d = dirs[i];
                    if (d.path === '/') {
                        rootDir = d;
                    } else {
                        subDirs.push(d);
                    }
                }

                if (dirParam) {
                    for (var j = 0; j < dirs.length; j++) {
                        var dp = dirs[j].path;
                        if (dp === '/' + dirParam || dp === dirParam || dp === '/' + dirParam + '/' || dp === dirParam + '/') {
                            currentDir = dirs[j];
                            break;
                        }
                    }
                }

                if (!currentDir) {
                    currentDir = rootDir;
                }

                var ANIMATE_COUNT = 30;
                var items = [];
                var itemIndex = 0;

                if (dirParam) {
                    items.push({
                        type: 'back',
                        label: '/',
                        url: '/',
                        time: ''
                    });
                }

                if (!dirParam && rootDir) {
                    for (var k = 0; k < subDirs.length; k++) {
                        var sd = subDirs[k];
                        var dirHref = '/?dir=' + encodeURIComponent(sd.path.replace(/^\/+/, ''));
                        items.push({
                            type: 'dir',
                            label: sd.title,
                            url: dirHref,
                            time: formatDate(parseInt(sd.create_time, 10))
                        });
                        itemIndex++;
                    }
                }

                if (currentDir && currentDir.articles) {
                    for (var a = 0; a < currentDir.articles.length; a++) {
                        var art = currentDir.articles[a];
                        var artUrl = buildArticleUrl(currentDir.path, art.url);
                        items.push({
                            type: 'file',
                            label: art.display_name,
                            url: artUrl,
                            time: formatDate(parseInt(art.create_time, 10))
                        });
                        itemIndex++;
                    }
                }

                var fileIndex = 0;
                var html = items.map(function(item, i) {
                    var extra = '';
                    if (i < ANIMATE_COUNT) {
                        extra = ' style="animation-delay:' + (i * 0.03).toFixed(2) + 's"';
                    }
                    var extraClass = '';
                    if (item.type === 'dir') {
                        extraClass = ' toc-dir';
                    } else if (item.type === 'back') {
                        extraClass = ' toc-back-root';
                    }
                    var num = '';
                    if (item.type === 'file') {
                        fileIndex++;
                        num = '<span class="toc-num">' + String(fileIndex).padStart(3, '0') + '</span>';
                    } else if (item.type === 'dir') {
                        num = '<span class="toc-num">[+]</span>';
                    } else {
                        num = '<span class="toc-num">[/]</span>';
                    }
                    return '<li class="toc-item' + extraClass + '"' + extra + '>' +
                        num +
                        '<a class="toc-link" href="' + item.url + '">' + item.label + '</a>' +
                        '<span class="toc-date">' + item.time + '</span>' +
                        '</li>';
                }).join('');

                document.body.classList.add('toc-animating');
                document.getElementById('toc-loading').style.display = 'none';
                var list = document.getElementById('toc-list');
                list.innerHTML = html;
                list.style.display = '';
                list.classList.add('done');

                setTimeout(function() {
                    document.body.classList.remove('toc-animating');
                }, 500);
            };

            var initTheme = function() {
                var saved = localStorage.getItem('pixel-theme');
                if (saved === 'light') {
                    applyLightTheme();
                }
            };

            var applyLightTheme = function() {
                var style = document.getElementById('pixel-style');
                style.textContent = style.textContent.replace(/:root\s*\{[^}]*\}/, function() {
                    return ':root {' +
                        '--bg: #e8e8e0;' +
                        '--card-bg: #f5f5ee;' +
                        '--text: #2d2d2d;' +
                        '--text-secondary: #6b6b6b;' +
                        '--accent: #e07b39;' +
                        '--accent-glow: #f09050;' +
                        '--border: #c0c0b0;' +
                        '--divider: #c0c0b0;' +
                        '--code-bg: #d5d0c0;' +
                        '--nav-hover-bg: #ddd8c5;' +
                        '--green: #4a9c3f;' +
                        '--yellow: #c0a030;' +
                        '--pink: #c05070;' +
                        '--cyan: #3090a0;' +
                        '}';
                });
                document.getElementById('theme-toggle').innerHTML = '[ ]';
                localStorage.setItem('pixel-theme', 'light');
            };

            var applyDarkTheme = function() {
                var style = document.getElementById('pixel-style');
                style.textContent = style.textContent.replace(/:root\s*\{[^}]*\}/, function() {
                    return ':root {' +
                        '--bg: #1a1a2e;' +
                        '--card-bg: #16213e;' +
                        '--text: #c7d2e0;' +
                        '--text-secondary: #7b8ca3;' +
                        '--accent: #ff6b35;' +
                        '--accent-glow: #ff9f45;' +
                        '--border: #2a3a5c;' +
                        '--divider: #2a3a5c;' +
                        '--code-bg: #0f1425;' +
                        '--nav-hover-bg: #1e2d4a;' +
                        '--green: #4ade80;' +
                        '--yellow: #facc15;' +
                        '--pink: #f472b6;' +
                        '--cyan: #22d3ee;' +
                        '}';
                });
                document.getElementById('theme-toggle').innerHTML = '[]';
                localStorage.setItem('pixel-theme', 'dark');
            };

            document.getElementById('theme-toggle').addEventListener('click', function() {
                if (localStorage.getItem('pixel-theme') === 'light') {
                    applyDarkTheme();
                } else {
                    applyLightTheme();
                }
            });

            fetch('/toc.json')
                .then(function(res) { return res.json(); })
                .then(renderToc)
                .catch(function(err) { console.error('Failed to load toc.json:', err); });

            initTheme();
        })();
    </script>
</body>
</html>
